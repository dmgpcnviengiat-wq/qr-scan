<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Quét QR nguyên liệu</title>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      font-size: 30px;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header,
    .manual-card,
    .message {
      background: #111827;
      border: 2px solid #334155;
      border-radius: 24px;
      padding: 18px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 40px;
      line-height: 1.2;
    }

    .sub {
      font-size: 27px;
      line-height: 1.45;
      color: #cbd5e1;
    }

    .camera-card {
      background: #020617;
      border: 2px solid #334155;
      border-radius: 24px;
      padding: 12px;
      overflow: hidden;
      position: relative;
    }

    video {
      width: 100%;
      min-height: 360px;
      max-height: 62vh;
      object-fit: cover;
      border-radius: 20px;
      background: black;
      display: block;
    }

    .scan-frame {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 68vw;
      max-width: 420px;
      height: 68vw;
      max-height: 420px;
      transform: translate(-50%, -50%);
      border: 6px solid #22c55e;
      border-radius: 24px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.32);
      pointer-events: none;
    }

    .btn {
      width: 100%;
      min-height: 88px;
      border: none;
      border-radius: 24px;
      padding: 14px 18px;
      font-size: 32px;
      font-weight: 900;
      cursor: pointer;
      line-height: 1.2;
      text-align: center;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-light {
      background: #e0e7ff;
      color: #1e40af;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    input {
      width: 100%;
      min-height: 84px;
      border-radius: 24px;
      border: 2px solid #475569;
      padding: 0 18px;
      font-size: 32px;
      margin-bottom: 12px;
      text-align: center;
    }

    .message {
      font-size: 28px;
      line-height: 1.45;
      color: #e5e7eb;
    }

    .error {
      background: #7f1d1d;
      border-color: #ef4444;
      color: white;
    }

    .success {
      background: #14532d;
      border-color: #22c55e;
      color: white;
    }

    .warning {
      background: #78350f;
      border-color: #f59e0b;
      color: white;
    }

    canvas {
      display: none;
    }

    @media (max-width: 390px) {
      html,
      body {
        font-size: 26px;
      }

      h1 {
        font-size: 35px;
      }

      .sub {
        font-size: 24px;
      }

      .btn {
        font-size: 28px;
        min-height: 78px;
      }

      input {
        font-size: 28px;
        min-height: 76px;
      }

      .message {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div class="page">
    <div class="header">
      <h1>Quét QR nguyên liệu</h1>
      <div class="sub">
        Bấm nút mở camera, đưa mã QR vào giữa khung xanh. Quét xong sẽ tự quay lại hệ thống.
      </div>
    </div>

    <div id="messageBox" class="message">
      Bấm “Mở camera” để bắt đầu quét.
    </div>

    <button class="btn btn-primary" onclick="startScanner()">
      Mở camera
    </button>

    <div class="camera-card">
      <video id="video" playsinline muted></video>
      <div class="scan-frame"></div>
    </div>

    <button class="btn btn-danger" onclick="stopScanner()">
      Tắt camera
    </button>

    <div class="manual-card">
      <div class="sub" style="margin-bottom:12px;">
        Nếu camera không mở hoặc không quét được, nhập Id QR:
      </div>
      <input id="manualQr" type="text" placeholder="Nhập Id QR">
      <button class="btn btn-light" onclick="submitManual()">
        Gửi mã QR
      </button>
    </div>

    <button class="btn btn-danger" onclick="goBackWithoutQr()">
      Quay lại
    </button>
  </div>

  <script>
    let stream = null;
    let scanLoopId = null;
    let detector = null;
    let isProcessing = false;
    let useNativeDetector = false;

    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get("returnUrl") || "";
    const lineId = params.get("lineId") || "";

    document.addEventListener("DOMContentLoaded", async function() {
      if (!returnUrl || !lineId) {
        showMessage("Thiếu returnUrl hoặc lineId. Vui lòng mở trang quét từ hệ thống xuất hàng.", "error");
        return;
      }

      if (!window.isSecureContext) {
        showMessage("Trang chưa chạy bằng HTTPS nên trình duyệt không cho mở camera. Hãy dùng link https://...github.io/...", "error");
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showMessage("Trình duyệt này không hỗ trợ mở camera. Hãy mở bằng Chrome hoặc Safari.", "error");
        return;
      }

      if ("BarcodeDetector" in window) {
        try {
          detector = new BarcodeDetector({ formats: ["qr_code"] });
          useNativeDetector = true;
          showMessage("Sẵn sàng. Máy này hỗ trợ quét QR nhanh bằng trình duyệt.", "success");
        } catch (err) {
          useNativeDetector = false;
          showMessage("Sẵn sàng. Máy này sẽ dùng bộ đọc QR dự phòng.", "warning");
        }
      } else {
        useNativeDetector = false;
        showMessage("Sẵn sàng. Máy này chưa hỗ trợ BarcodeDetector, sẽ dùng bộ đọc QR dự phòng.", "warning");
      }
    });

    function showMessage(message, type) {
      const box = document.getElementById("messageBox");
      box.className = "message";

      if (type === "error") box.classList.add("error");
      if (type === "success") box.classList.add("success");
      if (type === "warning") box.classList.add("warning");

      box.innerText = message;
    }

    async function startScanner() {
      if (isProcessing) return;

      stopScanner(false);

      const video = document.getElementById("video");

      try {
        showMessage("Đang mở camera. Nếu trình duyệt hỏi quyền, hãy bấm Cho phép.", "warning");

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        showMessage("Camera đã mở. Đưa mã QR vào giữa khung xanh.", "success");

        scanLoop();
      } catch (err) {
        let msg = "Không mở được camera.";

        if (err && err.name === "NotAllowedError") {
          msg = "Bạn đã chặn quyền camera. Vào cài đặt trình duyệt để cho phép camera.";
        } else if (err && err.name === "NotFoundError") {
          msg = "Không tìm thấy camera trên thiết bị.";
        } else if (err && err.name === "NotReadableError") {
          msg = "Camera đang bị ứng dụng khác sử dụng. Hãy tắt app camera/Zalo rồi thử lại.";
        } else if (err && err.name === "OverconstrainedError") {
          msg = "Camera không hỗ trợ cấu hình yêu cầu. Đang thử lại cấu hình thấp hơn.";
          showMessage(msg, "warning");
          startScannerLowQuality();
          return;
        }

        showMessage(msg + " Có thể nhập Id QR thủ công bên dưới.", "error");
      }
    }

    async function startScannerLowQuality() {
      const video = document.getElementById("video");

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        showMessage("Camera đã mở bằng cấu hình thấp. Đưa mã QR vào giữa khung xanh.", "success");

        scanLoop();
      } catch (err) {
        showMessage("Không mở được camera kể cả cấu hình thấp. Hãy mở bằng Chrome/Safari hoặc nhập Id QR thủ công.", "error");
      }
    }

    function stopScanner(showMsg) {
      if (scanLoopId) {
        cancelAnimationFrame(scanLoopId);
        scanLoopId = null;
      }

      if (stream) {
        stream.getTracks().forEach(function(track) {
          track.stop();
        });
        stream = null;
      }

      const video = document.getElementById("video");
      if (video) {
        video.pause();
        video.srcObject = null;
      }

      if (showMsg !== false) {
        showMessage("Đã tắt camera.", "warning");
      }
    }

    async function scanLoop() {
      if (isProcessing) return;

      const video = document.getElementById("video");

      if (!video || video.readyState < 2) {
        scanLoopId = requestAnimationFrame(scanLoop);
        return;
      }

      try {
        let qrText = "";

        if (useNativeDetector && detector) {
          qrText = await scanWithNativeDetector(video);
        }

        if (!qrText) {
          qrText = scanWithJsQr(video);
        }

        if (qrText) {
          isProcessing = true;
          showMessage("Đã quét được QR. Đang quay lại hệ thống...", "success");
          stopScanner(false);

          setTimeout(function() {
            returnWithQr(qrText);
          }, 300);

          return;
        }
      } catch (err) {}

      scanLoopId = requestAnimationFrame(scanLoop);
    }

    async function scanWithNativeDetector(video) {
      try {
        const barcodes = await detector.detect(video);

        if (barcodes && barcodes.length > 0) {
          return String(barcodes[0].rawValue || "").trim();
        }
      } catch (err) {}

      return "";
    }

    function scanWithJsQr(video) {
      if (typeof jsQR === "undefined") {
        return "";
      }

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", {
        willReadFrequently: true
      });

      const videoWidth = video.videoWidth || 1280;
      const videoHeight = video.videoHeight || 720;

      if (!videoWidth || !videoHeight) return "";

      const maxSize = 900;
      const scale = Math.min(1, maxSize / Math.max(videoWidth, videoHeight));

      canvas.width = Math.round(videoWidth * scale);
      canvas.height = Math.round(videoHeight * scale);

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "attemptBoth"
      });

      if (code && code.data) {
        return String(code.data).trim();
      }

      return "";
    }

    function returnWithQr(qrText) {
      const url = returnUrl
        + "?qr=" + encodeURIComponent(String(qrText || "").trim())
        + "&lineId=" + encodeURIComponent(lineId);

      window.location.href = url;
    }

    function submitManual() {
      const value = document.getElementById("manualQr").value.trim();

      if (!value) {
        alert("Vui lòng nhập Id QR.");
        return;
      }

      returnWithQr(value);
    }

    function goBackWithoutQr() {
      stopScanner(false);
      window.location.href = returnUrl;
    }

    window.addEventListener("pagehide", function() {
      stopScanner(false);
    });
  </script>
</body>
</html>
